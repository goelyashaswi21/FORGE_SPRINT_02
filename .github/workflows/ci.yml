name: CI
on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: pulsedesk_test
        ports: ['3306:3306']
        options: --health-cmd='mysqladmin ping' --health-interval=10s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql
      - name: Install dependencies
        run: cd backend && composer install --no-interaction --prefer-dist
      - name: Setup env
        run: |
          cd backend
          cp .env.example .env
          echo 'DB_HOST=127.0.0.1' >> .env
          echo 'DB_DATABASE=pulsedesk_test' >> .env
          echo 'DB_USERNAME=root' >> .env
          echo 'DB_PASSWORD=password' >> .env
          php artisan key:generate
      - name: Run migrations
        run: cd backend && php artisan migrate --force
      - name: Run tests
        run: cd backend && php artisan test
